      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    privileged: true
    security_opt:
      - seccomp:unconfined
    command: ["python3", "/opt/mahybridfuzz/src/orchestrator.py", "-c", "configs/jsoncpp.yml"]

