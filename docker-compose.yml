  magma-poppler:
    build:
      context: .
      dockerfile: docker/magma/Dockerfile.poppler
    volumes:
      - ./workspace/poppler:/workspace
      - ./src:/opt/mahybridfuzz/src
      - ./configs:/opt/mahybridfuzz/configs
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
