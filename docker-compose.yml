version: "3.8"

services:
  fuzzer:
    build:
      context: .
      dockerfile: docker/Dockerfile.fuzzer
    volumes:
      - ./workspace:/workspace
      - ./src:/opt/mahybridfuzz/src
      - ./configs:/opt/mahybridfuzz/configs
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    privileged: true
    security_opt:
      - seccomp:unconfined
    command: ["python3", "/opt/mahybridfuzz/src/orchestrator.py"]

  jsoncpp:
    build:
      context: .
      dockerfile: docker/Dockerfile.jsoncpp
    volumes:
      - ./workspace:/workspace
      - ./src:/opt/mahybridfuzz/src
      - ./configs:/opt/mahybridfuzz/configs
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    privileged: true
    security_opt:
      - seccomp:unconfined
    command: ["python3", "/opt/mahybridfuzz/src/orchestrator.py", "-c", "configs/jsoncpp.yml"]

  magma-libpng:
    build:
      context: .
      dockerfile: docker/magma/Dockerfile.libpng
    volumes:
      - ./workspace/libpng:/workspace
      - ./src:/opt/mahybridfuzz/src
      - ./configs:/opt/mahybridfuzz/configs
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    privileged: true
    security_opt:
      - seccomp:unconfined
    command: ["python3", "/opt/mahybridfuzz/src/orchestrator.py", "-c", "configs/magma/libpng.yml"]

