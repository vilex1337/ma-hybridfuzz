# MA-HybridFuzz Configuration

logging:
  # 0 = warnings/errors only
  # 1 = high-level pipeline logs
  # 2 = important internals: IR building, builder decisions, fuzzer init, distance stats
  # 3 = full debug logs
  verbosity: 1

session:
  # Optional inference metrics session id. If empty, MA-HybridFuzz generates one
  # per fuzzer process. Can also be overridden with MA_HYBRIDFUZZ_SID.
  id: ""

target:
  binary: ""           # Path to target binary (inside container)
  source_dir: ""       # Path to target source code
  # Optional: Makefile directory with an `ir` target. Defaults to build_dir,
  # then source_dir. The target should write .ll files to $IR_DIR.
  # ir_build_dir: ""
  target_function: ""  # Target function name to reach
  bug_type: ""         # e.g., buffer_overflow, use_after_free, integer_overflow
  args: ["@@"]         # CLI args for the binary; "@@" is replaced with the seed
                       # file path (AFL++ convention). Use [] to feed via stdin.

llm:
  # Provider: anthropic | openai | gemini | self_hosted
  #   anthropic → requires ANTHROPIC_API_KEY
  #   openai    → requires OPENAI_API_KEY  (Codex API key)
  #   gemini    → requires GEMINI_API_KEY  (or GOOGLE_API_KEY)
  #   self_hosted → requires no API key, but `base_url` must be set to the model endpoint
  provider: "self_hosted"
  # Popular model IDs per provider (pick one that matches `provider`):
  #   anthropic: claude-opus-4-6, claude-sonnet-4-6, claude-haiku-4-5
  #   openai:    gpt-5, gpt-5-mini, gpt-4o, gpt-4o-mini, o1, o1-mini
  #   gemini:    gemini-2.5-pro, gemini-2.5-flash, gemini-2.0-flash, gemini-1.5-flash
  #   self_hosted: <custom_model_name>, qwen2.5-coder-14b
  model: "qwen2.5-coder-14b"
  base_url: ""  # Optional custom API base URL (e.g., for self-hosted models)
  use_chat: true 
  max_tokens: 4096
  temperature: 0.3

fuzzer:
  engine: "afl++"
  timeout: 3600          # Total fuzzing time in seconds (1 hour default)
  exec_timeout: 1000     # Per-execution timeout in ms
  memory_limit: 256      # Memory limit in MB
  seed_count: 20         # Number of seeds to pre-generate
  use_asan: true
  use_ubsan: true

attention_distance:
  # URL of the LineVul attention distance server (inference/linevul_attention_distance_server.ipynb)
  # Run the Kaggle notebook and paste the ngrok Public URL here.
  server_url: ""  # e.g., "https://<id>.ngrok-free.app"

scheduler:
  attention_weight: 0.6  # Weight for attention distance in scheduling
  coverage_weight: 0.3   # Weight for coverage novelty
  speed_weight: 0.1      # Weight for execution speed

reassessment:
  plateau_threshold: 300  # Seconds without new coverage to trigger reassessment
  reassessment_coverage_rate: 0.05  # Trigger if coverage grows by less than 5% over plateau_threshold
  max_reassessments: 5    # Max number of LLM reassessment rounds

paths:
  corpus: "/workspace/corpus"
  crashes: "/workspace/crashes"
  mutators: "/workspace/mutators"
  distance_cache: "/workspace/distance_cache"
  coverage: "/workspace/coverage"
  logs: "/workspace/logs"
  memory: "/workspace/memory"       # persistent memory: pre-phase cache, reassessment history, coverage snapshots
