# MA-HybridFuzz — magma/poppler pdf_fuzzer target

logging:
  verbosity: 2

attention:
  enabled: true

target:
  binary: "/targets/magma/poppler/pdf_fuzzer"
  source_dir: "/targets/poppler"
  build_dir: "/targets/magma/poppler"
  ir_build_dir: "/targets/magma/poppler"
  ir_build_timeout: 900
  target_function: "PDFDoc::setup"
  bug_type: "heap_buffer_overflow"
  args: ["@@"]
  program_usage: |
    Poppler is a PDF rendering library. The fuzzer exercises PDF document
    loading and page rendering. Interesting inputs: corrupt cross-reference
    tables, encrypted PDFs with bad passwords, PDFs with embedded JavaScript,
    circular object references, oversized page trees, and malformed content
    streams (compressed or uncompressed).

llm:
  provider: "openai"
  model: "gpt-4o"
  # provider: "cliproxy"
  # model: "gpt-5.4"
  # base_url: "http://host.docker.internal:8317/v1"
  # api_key: "sk-2FKtEdnmkEOJ5OYDWzgOgEClAoBPulYHlps76jzhgPClv"
  max_tokens: 4096
  temperature: 0.3
  timeout: 600

fuzzer:
  engine: "afl++"
  timeout: 21600
  exec_timeout: 2000
  memory_limit: 512
  seed_count: 5
  use_asan: true
  use_ubsan: true
  use_custom_mutator: true

attention_distance:
  server_url: "https://45c3-34-125-73-107.ngrok-free.app"

scheduler:
  attention_weight: 0.6
  coverage_weight: 0.3
  speed_weight: 0.1

reassessment:
  plateau_threshold: 1800
  reassessment_coverage_rate: 0.05
  max_reassessments: 100

paths:
  corpus: "/workspace/corpus"
  crashes: "/workspace/output"
  mutators: "/workspace/mutators"
  distance_cache: "/workspace/distance_cache"
  coverage: "/workspace/coverage"
  logs: "/workspace/logs"
  memory: "/workspace/memory"
