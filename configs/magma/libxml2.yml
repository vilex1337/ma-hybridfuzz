# MA-HybridFuzz — magma/libxml2_xml_read_memory_fuzzer target

logging:
  verbosity: 2

attention:
  enabled: false

target:
  binary: "/targets/magma/libxml2/libxml2_xml_read_memory_fuzzer"
  source_dir: "/targets/libxml2"
  build_dir: "/targets/magma/libxml2"
  ir_build_dir: "/targets/magma/libxml2"
  target_function: "xmlParseDocument"
  bug_type: "heap_buffer_overflow"
  args: ["@@"]
  program_usage: |
    libxml2 is an XML parsing library. The fuzzer exercises xmlReadMemory
    to parse arbitrary XML input. Interesting inputs: deeply nested
    elements, external entity references, namespace declarations, malformed
    UTF-8 sequences, CDATA sections, DTD declarations, and oversized
    attribute values.

llm:
  provider: "cliproxy"
  model: "gpt-5.4"
  base_url: "http://host.docker.internal:8317/v1"
  api_key: "sk-2FKtEdnmkEOJ5OYDWzgOgEClAoBPulYHlps76jzhgPClv"
  max_tokens: 4096
  temperature: 0.3
  timeout: 600

fuzzer:
  engine: "afl++"
  timeout: 21600
  exec_timeout: 1000
  memory_limit: 256
  seed_count: 5
  use_asan: true
  use_ubsan: true
  use_custom_mutator: true

attention_distance:
  server_url: "https://48b4-34-125-68-208.ngrok-free.app"

scheduler:
  attention_weight: 0.6
  coverage_weight: 0.3
  speed_weight: 0.1

reassessment:
  plateau_threshold: 1800
  reassessment_coverage_rate: 0.05
  max_reassessments: 100

paths:
  corpus: "/workspace/corpus"
  crashes: "/workspace/output"
  mutators: "/workspace/mutators"
  distance_cache: "/workspace/distance_cache"
  coverage: "/workspace/coverage"
  logs: "/workspace/logs"
  memory: "/workspace/memory"
